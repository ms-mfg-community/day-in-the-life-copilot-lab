{% extends "base.html" %}
{% block title %}Delete Student{% endblock %}
{% block content %}
<h2>Delete</h2>
<h3>Are you sure you want to delete this?</h3>
<div>
    <h4>Student</h4>
    <hr />
    <dl class="row">
        <dt class="col-sm-2">Last Name</dt><dd class="col-sm-10">{{ student.last_name }}</dd>
        <dt class="col-sm-2">First Name</dt><dd class="col-sm-10">{{ student.first_name }}</dd>
        <dt class="col-sm-2">Enrollment Date</dt><dd class="col-sm-10">{{ student.enrollment_date }}</dd>
    </dl>
    <form method="post">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />
        <button type="submit" class="btn btn-danger">Delete</button> |
        <a href="{{ url_for('students.index') }}">Back to List</a>
    </form>
</div>
{% endblock %}
