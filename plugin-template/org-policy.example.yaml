# Organization policy for Copilot plugin sources
#
# This file is consumed by `plugin-template/scripts/policy.mjs` and is designed
# to be mirrored into an org-wide `.copilot/org-policy.yaml` that gates which
# plugin registries/sources are allowed on developer machines.
#
# Semantics:
#   default_action: deny — any source not on the allowlist is rejected.
#   allowlist entries may use `*` as a wildcard inside a segment.
#
# See plugin-template/README.md for the enforcement walkthrough.

default_action: deny

allowlist:
  - source: "contoso-internal/contoso-copilot-plugins"
    notes: "Primary private registry. Signed releases only."
  - source: "contoso-internal/*"
    notes: "All repos under the contoso-internal org."
  - source: "github/awesome-copilot"
    notes: "Vendor-curated public marketplace. Pinned to a specific tag at install time."

# Optional: require additional attestations.
require:
  signed_releases: true
  sbom: true
