# Release workflow — tags, GitHub Release, and SBOM artifact.
#
# Fires on push of a semantic version tag (e.g. v0.1.0). Produces:
#   - a GitHub Release with auto-generated notes
#   - an SBOM (CycloneDX) attached as a release asset
#   - a signed provenance attestation via GitHub's built-in generator
#
# Required permissions live at the job level (least privilege).

name: release
on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate manifest
        run: |
          test -f manifest.yaml
          grep -E '^version:\s+"?'"${GITHUB_REF_NAME#v}"'"?\s*$' manifest.yaml

      - name: Generate SBOM (CycloneDX)
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: cyclonedx-json
          output-file: sbom.cdx.json

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v1
        with:
          subject-path: |
            manifest.yaml
            sbom.cdx.json

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            manifest.yaml
            sbom.cdx.json
